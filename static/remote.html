<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>bilikara remote</title>
    <link rel="stylesheet" href="/remote.css" />
  </head>
  <body>
    <main class="remote-shell">
      <header class="hero-card">
        <p class="eyebrow">Mobile Request</p>
        <h1>bilikara 点歌台</h1>
        <p class="hero-copy">在同一局域网里，用手机查看当前队列、浏览点歌历史，并直接继续点歌。</p>
      </header>

      <section class="panel now-playing-panel">
        <div class="panel-head">
          <p class="panel-tag">Now Playing</p>
          <button type="button" id="refresh-button" class="ghost-button">刷新</button>
        </div>
        <h2 id="current-title">正在读取状态...</h2>
        <p id="current-meta" class="muted"></p>
        <div id="audio-variant-bar" class="audio-variant-bar hidden"></div>
      </section>

      <section class="panel request-panel">
        <div class="panel-head">
          <p class="panel-tag">Song Request</p>
        </div>
        <form id="request-form" class="request-form">
          <textarea
            id="url-input"
            name="url"
            rows="3"
            placeholder="输入 bilibili 视频链接、BV 号或 av 号"
            autocomplete="off"
          ></textarea>
          <div class="action-row">
            <button type="submit" class="primary-button">加入队列</button>
            <button type="button" id="add-next-button" class="secondary-button">顶歌到下一首</button>
          </div>
          <p id="form-message" class="message"></p>
        </form>
      </section>

      <section class="panel queue-panel">
        <div class="panel-head panel-head-stack">
          <div>
            <p class="panel-tag" id="list-tag">Queue</p>
            <h2 class="list-heading" id="list-title">播放队列</h2>
          </div>
          <span id="list-count" class="count-chip">0 首</span>
        </div>

        <div class="view-toggle" role="tablist" aria-label="切换列表视图">
          <button
            type="button"
            id="queue-view-button"
            class="toggle-button active"
            data-view="queue"
            role="tab"
            aria-selected="true"
          >
            队列
          </button>
          <button
            type="button"
            id="history-view-button"
            class="toggle-button"
            data-view="history"
            role="tab"
            aria-selected="false"
          >
            历史
          </button>
        </div>

        <div id="queue-list" class="list"></div>
        <div id="history-list" class="list hidden"></div>
      </section>
    </main>

    <template id="queue-item-template">
      <article class="queue-item">
        <div class="queue-main">
          <h3 class="queue-title"></h3>
          <p class="queue-note"></p>
        </div>
        <span class="queue-state"></span>
      </article>
    </template>

    <template id="history-item-template">
      <article class="history-item">
        <div class="history-main">
          <h3 class="history-title"></h3>
          <div class="history-meta">
            <span class="history-time"></span>
            <span class="history-count"></span>
          </div>
        </div>
        <div class="history-actions">
          <button type="button" data-action="history-tail" class="primary-button">再点一次</button>
          <button type="button" data-action="history-next" class="secondary-button">顶歌</button>
        </div>
      </article>
    </template>

    <script src="/remote.js" defer></script>
  </body>
</html>
