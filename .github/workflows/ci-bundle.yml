name: CI And Bundles

on:
  push:
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.11"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Compile Python files
        run: python -m compileall bilikara tests server.py start_bilikara.py build_bundle.py

  bundle:
    name: Bundle (${{ matrix.label }})
    needs: test
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            slug: windows
          - os: macos-latest
            label: macOS
            slug: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install FFmpeg on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install ffmpeg -y

      - name: Install FFmpeg on macOS
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install packaging dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-packaging.txt

      - name: Build app bundle
        run: python build_bundle.py

      - name: Resolve bundle archive name
        id: bundle-name
        shell: bash
        run: |
          ref_name="${GITHUB_REF_NAME:-local}"
          safe_ref="$(printf '%s' "$ref_name" | sed -E 's/[^A-Za-z0-9._-]+/-/g; s/^-+//; s/-+$//')"
          if [ -z "$safe_ref" ]; then
            safe_ref="local"
          fi
          archive_name="bilikara-${safe_ref}-${{ matrix.slug }}.zip"
          artifact_name="bilikara-${safe_ref}-${{ matrix.slug }}"
          echo "archive_name=$archive_name" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"
          echo "BUNDLE_ARCHIVE=$archive_name" >> "$GITHUB_ENV"

      - name: Archive Windows bundle
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/bilikara -DestinationPath $env:BUNDLE_ARCHIVE

      - name: Archive macOS bundle
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/bilikara.app "$BUNDLE_ARCHIVE"

      - name: Upload Windows bundle artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.bundle-name.outputs.artifact_name }}
          path: dist/bilikara
          if-no-files-found: error

      - name: Upload macOS bundle artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.bundle-name.outputs.artifact_name }}
          path: dist/bilikara.app
          if-no-files-found: error

      - name: Upload bundle to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.bundle-name.outputs.archive_name }}
          generate_release_notes: true
